services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: treaty-app:prod
    container_name: treaty-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4201
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:4201').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    expose:
      - "4201"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: treaty-cloudflared
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
